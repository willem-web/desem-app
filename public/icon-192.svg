<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAB755"/>
      <stop offset="100%" stop-color="#C6822A"/>
    </linearGradient>
    <linearGradient id="bread" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFF8EB"/>
      <stop offset="100%" stop-color="#FEEFC7"/>
    </linearGradient>
    <linearGradient id="crust" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#C6822A"/>
      <stop offset="100%" stop-color="#9A6220"/>
    </linearGradient>
    <linearGradient id="score" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9A6220"/>
      <stop offset="60%" stop-color="#6E4518"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Bread boule shape — main body -->
  <ellipse cx="256" cy="280" rx="145" ry="120" fill="url(#bread)" stroke="url(#crust)" stroke-width="6"/>

  <!-- Crust top dome (darker) -->
  <path d="M120 260 Q256 130 392 260" fill="url(#crust)" opacity="0.9"/>

  <!-- Score marks on top of bread -->
  <path d="M190 215 Q256 175 322 215" fill="none" stroke="url(#score)" stroke-width="6" stroke-linecap="round"/>
  <path d="M210 240 Q256 208 302 240" fill="none" stroke="url(#score)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Steam wisps -->
  <path d="M210 170 Q205 145 215 125" fill="none" stroke="#FFF8EB" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 155 Q250 128 260 108" fill="none" stroke="#FFF8EB" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <path d="M300 168 Q295 142 305 122" fill="none" stroke="#FFF8EB" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Subtle shadow under bread -->
  <ellipse cx="256" cy="405" rx="120" ry="12" fill="#9A6220" opacity="0.2"/>
</svg>
